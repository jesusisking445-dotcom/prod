version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: homodenthealth-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: homodenthealth
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - homodenthealth-network

  backend:
    build: .
    container_name: homodenthealth-backend
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/homodenthealth?authSource=admin
      PORT: 4000
      SERVE_FRONTEND: "false"
      JWT_SECRET: change_this_to_a_real_32+_char_secret_before_deploying
      REFRESH_TOKEN_SECRET: change_this_to_a_different_real_secret_before_deploying
      REFRESH_TOKEN_EXPIRE: 30d
      JWT_EXPIRE: 7d
      CORS_ORIGIN: http://localhost:3000
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASS: your-app-password
      SMTP_FROM: noreply@homodenthealth.ng
      CONTACT_INBOX_EMAIL: your-email@gmail.com
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
    networks:
      - homodenthealth-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  homodenthealth-network:
    driver: bridge

# NOTE: This compose file runs the backend in API-only mode (SERVE_FRONTEND=false).
# Serve the frontend/ folder separately — e.g. with any static host, nginx, or
# `npx serve frontend`. Set frontend/config.js's API_BASE_URL to wherever this
# backend ends up (e.g. http://localhost:4000 for local Docker use).
#
# IMPORTANT: change JWT_SECRET, REFRESH_TOKEN_SECRET, and the Mongo passwords
# above before deploying anywhere public.
